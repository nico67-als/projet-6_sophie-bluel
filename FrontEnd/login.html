<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Work+Sans&display=swap"
        rel="stylesheet">
    <meta name="description" content="">
    <link rel="stylesheet" href="./assets/login.css">
</head>

<body>
    <header>
        <h1>Sophie Bluel <span>Architecte d'intérieur</span></h1>
        <nav>
            <ul>
                <li>projets</li>
                <li>contact</li>
                <li>
                    <a href="/login.html" class="active-page">login</a>
                </li>
                <li><img src="./assets/icons/instagram.png" alt="Instagram"></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="login">
            <h2 class="login-title">Log In</h2>
            <form class="login-form">
                <label for="email" class="login-label">E-mail</label>
                <input type="email" id="email" class="login-field" name="email" required>
                <label for="password" class="login-label">Mot de passe</label>
                <input type="password" id="password" class="login-field" name="password" required>
                <p id="login-error" class="error hidden">Identifiants incorrects. Veuillez réessayer.</p>
                <input type="submit" class="login-button" value="Se connecter">
                <a class="login-pw-forgot" href="#">Mot de passe oublié</a>
            </form>
        </section>        
    </main>
    <footer>
            <nav>
                <ul>
                    <li>Mentions Légales</li>
                </ul>
            </nav>
        </footer>
        <script src="./assets/login.js"></script>
</body>

</html>
